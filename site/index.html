<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Current and upcoming exhibitions worldwide featuring African and Black diaspora artists.">
  <meta property="og:title" content="Radar — Forme Femine">
  <meta property="og:description" content="Current and upcoming exhibitions worldwide featuring African and Black diaspora artists">
  <meta property="og:url" content="https://radar.formefemine.com">
  <title>Radar — Forme Femine</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="hero">
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark mode">&#9790;</button>
    <div class="hero-inner">
      <h1 class="hero-title"><a href="/" class="hero-title-link">Radar</a></h1>
      <p class="hero-subtitle">Current and upcoming exhibitions worldwide featuring African and Black diaspora artists</p>
      <p class="hero-stats" id="hero-stats"></p>
    </div>
  </header>

  <div class="editorial-wrap" id="editorial-wrap">
    <div id="last-chance"></div>
    <div id="just-opened"></div>
  </div>

  <nav class="filter-bar" id="filter-bar">
    <div class="filter-bar-inner">
      <div class="filter-row filter-row-primary">
        <div class="filter-group">
          <label for="filter-search" class="sr-only">Search</label>
          <input type="search" id="filter-search" class="filter-search" placeholder="Search exhibitions, artists, venues..." autocomplete="off">
        </div>
        <div class="filter-group">
          <label for="filter-status" class="sr-only">Status</label>
          <select id="filter-status">
            <option value="">All Statuses</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-city" class="sr-only">City</label>
          <select id="filter-city">
            <option value="">All Cities</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-country" class="sr-only">Country</label>
          <select id="filter-country">
            <option value="">All Countries</option>
          </select>
        </div>
        <button type="button" class="filter-toggle" id="filter-toggle">
          <span class="filter-toggle-label">More filters</span>
          <span class="chevron">&#9662;</span>
        </button>
      </div>
      <div class="filter-row filter-row-secondary" id="filter-row-secondary">
        <div class="filter-group">
          <label for="filter-region" class="sr-only">Region</label>
          <select id="filter-region">
            <option value="">All Regions</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-type" class="sr-only">Type</label>
          <select id="filter-type">
            <option value="">All Types</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-admission" class="sr-only">Admission</label>
          <select id="filter-admission">
            <option value="">All Admission</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-medium" class="sr-only">Medium</label>
          <select id="filter-medium">
            <option value="">All Mediums</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-focus" class="sr-only">Focus</label>
          <select id="filter-focus">
            <option value="">All Focus</option>
          </select>
        </div>
      </div>
      <div class="time-filters" id="time-filters">
        <button class="time-pill" data-time="today">Today</button>
        <button class="time-pill" data-time="tomorrow">Tomorrow</button>
        <button class="time-pill" data-time="this-week">This week</button>
        <button class="time-pill" data-time="this-weekend">This weekend</button>
        <button class="time-pill" data-time="this-month">This month</button>
        <button class="time-pill" data-time="opening-soon">Opening soon</button>
        <button class="time-pill" data-time="closing-soon">Closing soon</button>
      </div>
      <p class="filter-count" id="filter-count"></p>
    </div>
  </nav>

  <main>
    <section class="exhibition-grid" id="exhibition-grid" role="list"></section>
    <div class="empty-state" id="empty-state" hidden>
      <p>No exhibitions match your filters.</p>
    </div>
  </main>

  <footer>
    <p class="footer-brand">Radar by <a href="https://formefemine.com" class="footer-link">Forme Femine</a> &middot; <a href="about.html" class="footer-about-link">About</a></p>
    <p class="footer-copy">&copy; 2026</p>
  </footer>

  <script src="js/site-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
